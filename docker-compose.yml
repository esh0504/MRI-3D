# Mounts the data + project folders and wires the container to the host's
# ArtiSynth (for the forward-model client).  Adjust the left-hand host paths
# if yours differ.  Run:  docker compose run --rm tongue
services:
  tongue:
    build: .
    volumes:
      - "C:/Users/d11/Project/Tongue_Inverse:/work"                       # outputs + scripts share
      - "E:/Datasets/XAI/data/GT_Segmentations/Subject1:/data/masks:ro"   # mask_*.mat
      - "C:/Users/d11/artisynth:/data/artisynth:ro"                       # for tongue.obj (retarget)
    environment:
      MRI_ROOT: /data/masks
      MRI_OUT: /work
      FORWARD_DIR: /work/forward
      TONGUE_OBJ: /data/artisynth/artisynth_core/src/artisynth/models/tongue3d/geometry/tongue.obj
      TONGUE_HOST: host.docker.internal   # host's ArtiSynth forward_server
      TONGUE_PORT: "5005"
    # host.docker.internal is automatic on Docker Desktop (Win/Mac).
    # On Linux Docker, this line maps it to the host:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /work
    stdin_open: true
    tty: true

  # All-in-one: Linux ArtiSynth (native solver) + Python + JPype in ONE container.
  # artisynth_forward.py runs fully inside (no host ArtiSynth needed).
  # Build: docker compose build tongue-artisynth   (heavy: clones+builds ArtiSynth)
  tongue-artisynth:
    build:
      context: .
      dockerfile: Dockerfile.artisynth
    volumes:
      - "C:/Users/d11/Project/Tongue_Inverse:/work"
      - "E:/Datasets/XAI/data/GT_Segmentations/Subject1:/data/masks:ro"
      - "C:/Users/d11/artisynth:/opt/artisynth"          # YOUR ArtiSynth tree (READ-WRITE for one-time lib fetch)
    environment:
      ARTISYNTH_HOME: /opt/artisynth/artisynth_core
      TONGUE_MODEL: artisynth.models.tongue3d.HexTongueDemo
      MRI_ROOT: /data/masks
      MRI_OUT: /work
      FORWARD_DIR: /work/forward
      JVM_XMX: 4g
    working_dir: /work
    stdin_open: true
    tty: true
